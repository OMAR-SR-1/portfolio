<section class="about section" id="apropos">
  <div class="container">
    <p class="eyebrow fade-in">À propos de moi</p>
    <h2 class="section-title fade-in">Qui suis-je <span class="hl">?</span></h2>
    <p class="about__bio fade-in">{{ bio }}</p>

    <div class="about__grid">
      <div class="about__card fade-in" *ngFor="let card of cards">
        <span class="about__icon">{{ card.icon }}</span>
        <h3>{{ card.title }}</h3>
        <p>{{ card.desc }}</p>
      </div>
    </div>
  </div>
</section>
